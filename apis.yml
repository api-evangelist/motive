description: >
  Motive (formerly KeepTruckin) is a fleet management platform serving more than 120,000 businesses across trucking,
  logistics, construction, agriculture, and field service industries. The Motive REST API provides programmatic
  access to driver management, vehicle tracking, Hours of Service (HOS) compliance, IFTA reporting, dashcam events,
  dispatch workflows, geofencing, and real-time location data. Developers authenticate via OAuth 2.0 with scoped
  access tokens and can reach endpoints at api.gomotive.com (or the legacy api.keeptruckin.com base URL). The
  self-serve Developer Portal allows partners to build and publish apps to the Motive App Marketplace, and Postman
  collections are available alongside interactive API reference documentation.
